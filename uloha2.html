<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Hádaj číslo - prompt verzia</title>
</head>
<body>

<script>
    // náhodné číslo od 1 do 10
    let randomNumber = Math.floor(Math.random() * 10) + 1;

    // vstup od používateľa
    let userGuess = prompt("Hádaj číslo od 1 do 10:");

    // premena na číslo
    userGuess = Number(userGuess);

    // vyhodnotenie
    if (userGuess === randomNumber) {
        alert("Uhádol si!");
    } else {
        alert("Neuhádol si! Správne číslo bolo: " + randomNumber);
    }
</script>

</body>
</html>
