<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Projekt z JavaScript</title>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>

body{
font-family: Arial;
text-align:center;
}

/* ===== SLIDER ===== */

#slides{
position:relative;
height:200px;
width:400px;
margin:auto;
list-style:none;
padding:0;
}

.slide{
position:absolute;
left:0;
top:0;
width:100%;
height:100%;
opacity:0;
z-index:1;
transition:opacity 1s;
color:white;
font-size:30px;
display:flex;
align-items:center;
justify-content:center;
}

.showing{
opacity:1;
z-index:2;
}

.slide:nth-of-type(1){background:red;}
.slide:nth-of-type(2){background:orange;}
.slide:nth-of-type(3){background:green;}
.slide:nth-of-type(4){background:blue;}
.slide:nth-of-type(5){background:purple;}

/* ===== ANIMÁCIA BOX ===== */

#box{
width:100px;
height:100px;
background:black;
margin:30px auto;
position:relative;
}

</style>
</head>

<body>

<h1>JavaScript projekt</h1>

<!-- ===== SLIDER ===== -->

<ul id="slides">

<li class="slide showing">Slide 1</li>
<li class="slide">Slide 2</li>
<li class="slide">Slide 3</li>
<li class="slide">Slide 4</li>
<li class="slide">Slide 5</li>

</ul>

<br>

<button id="previous">Previous</button>
<button id="pause">Pause</button>
<button id="next">Next</button>

<hr>

<!-- ===== FORMULÁR (DOM) ===== -->

<h2>Kalkulačka</h2>

a: <input id="a" type="number" value="0"><br><br>
b: <input id="b" type="number" value="0"><br><br>

<button onclick="calculate()">Spočítať</button>

<p>Výsledok: <span id="result">0</span></p>

<hr>

<!-- ===== jQuery animácia ===== -->

<h2>jQuery animácia</h2>

<button class="run">Spustiť animáciu</button>

<div id="box"></div>

<script>

/* ===== SLIDER JS ===== */

var slides = document.querySelectorAll('#slides .slide');
var currentSlide = 0;

var slideInterval = setInterval(nextSlide,2000);

function nextSlide(){
goToSlide(currentSlide+1);
}

function previousSlide(){
goToSlide(currentSlide-1);
}

function goToSlide(n){

slides[currentSlide].className='slide';
currentSlide=(n+slides.length)%slides.length;
slides[currentSlide].className='slide showing';

}

/* tlačidlá */

var next=document.getElementById('next');
var previous=document.getElementById('previous');
var pauseButton=document.getElementById('pause');

var playing=true;

function pauseSlideshow(){
pauseButton.innerHTML='Play';
playing=false;
clearInterval(slideInterval);
}

function playSlideshow(){
pauseButton.innerHTML='Pause';
playing=true;
slideInterval=setInterval(nextSlide,2000);
}

pauseButton.onclick=function(){

if(playing){pauseSlideshow();}
else{playSlideshow();}

};

next.onclick=function(){
pauseSlideshow();
nextSlide();
};

previous.onclick=function(){
pauseSlideshow();
previousSlide();
};


/* ===== FORMULÁR JS ===== */

function calculate(){

var a=Number(document.getElementById("a").value);
var b=Number(document.getElementById("b").value);

var c=a+b;

document.getElementById("result").innerHTML=c;

}


/* ===== jQuery ANIMÁCIA ===== */

$(document).ready(function(){

$(".run").click(function(){

$("#box")

.animate({opacity:"0.1", left:"+=400"},1200)
.animate({opacity:"0.4", left:"+=160", height:"20", width:"20"},"slow")
.animate({opacity:"1", left:"0", height:"100", width:"100"},"slow")
.animate({top:"0"},"fast")
.slideUp()
.slideDown("slow");

});

});

</script>

</body>
</html>
