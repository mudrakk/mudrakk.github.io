<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>pespepspepsp</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    margin-top:100px;
    transition: background 0.5s;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#counter{
    font-size:24px;
    margin-top:20px;
}
</style>
</head>

<body>

<h1>Moja JavaScript stránka</h1>

<button onclick="changeColor()">Klikni na mňa</button>

<p id="counter">Kliknutia: 0</p>

<script>

let clicks = 0;

function changeColor(){

    clicks++;
    document.getElementById("counter").textContent = "Kliknutia: " + clicks;

    const colors = ["red","blue","green","purple","orange","pink","yellow"];

    const randomColor = colors[Math.floor(Math.random()*colors.length)];

    document.body.style.background = randomColor;

}

</script>

</body>
</html>
