<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>fofo</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .calculator {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            text-align: center;
        }

        input {
            width: 80px;
            padding: 10px;
            margin: 5px;
            font-size: 18px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            font-size: 18px;
            cursor: pointer;
        }

        #result {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="calculator">
    <h2>Kalkulačka</h2>

    <input type="number" id="num1" placeholder="Číslo 1">
    <input type="number" id="num2" placeholder="Číslo 2">

    <div>
        <button onclick="calculate('+')">+</button>
        <button onclick="calculate('-')">-</button>
        <button onclick="calculate('*')">*</button>
        <button onclick="calculate('/')">/</button>
    </div>

    <div id="result">Výsledok: </div>
</div>

<script>
function calculate(operation) {
    let num1 = parseFloat(document.getElementById("num1").value);
    let num2 = parseFloat(document.getElementById("num2").value);
    let result;

    if (isNaN(num1) || isNaN(num2)) {
        document.getElementById("result").innerText = "Zadaj obe čísla!";
        return;
    }

    switch(operation) {
        case '+':
            result = num1 + num2;
            break;
        case '-':
            result = num1 - num2;
            break;
        case '*':
            result = num1 * num2;
            break;
        case '/':
            if (num2 === 0) {
                document.getElementById("result").innerText = "Nedá sa deliť nulou!";
                return;
            }
            result = num1 / num2;
            break;
    }

    document.getElementById("result").innerText = "Výsledok: " + result;
}
</script>

</body>
</html>
