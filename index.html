<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>stvorcovac</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f4f4;
}

.container {
    margin-top: 40px;
}

select, button {
    padding: 10px;
    margin: 10px;
    font-size: 16px;
}

#squares {
    margin-top: 20px;
}

.square {
    width: 60px;
    height: 60px;
    display: inline-block;
    margin: 5px;
    line-height: 60px;
    color: white;
    font-weight: bold;
    border-radius: 5px;
}
</style>

</head>
<body>

<div class="container">
    <h2>stvorcovac</h2>

    <select id="count">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="5">5</option>
        <option value="10">10</option>
    </select>

    <button onclick="generateSquares()">Vygeneruj</button>

    <div id="squares"></div>
</div>

<script>
function generateSquares() {
    let count = document.getElementById("count").value;
    let container = document.getElementById("squares");

    container.innerHTML = "";

    for (let i = 1; i <= count; i++) {
        let div = document.createElement("div");
        div.className = "square";

        // náhodná farba
        let r = Math.floor(Math.random() * 256);
        let g = Math.floor(Math.random() * 256);
        let b = Math.floor(Math.random() * 256);
        div.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;

        div.textContent = i;

        container.appendChild(div);
    }
}
</script>

</body>
</html>
