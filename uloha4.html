<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Tulák</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
        }
        img {
            width: 150px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>Kade sa má tulák vybrať?</h1>

<button onclick="vygeneruj()">Vyber smer</button>

<p id="vystup"></p>
<img id="obrazok" src="" alt="smer">

<script>
function vygeneruj() {
    const smery = ["east", "south", "north", "west"];
    

    const smer = smery[Math.floor(Math.random() * smery.length)];
    

    const vzdialenost = Math.floor(Math.random() * (9900 - 100 + 1)) + 100;
    
    document.getElementById("vystup").innerText =
        "Tulák, choď na " + smer + " a prejdi " + vzdialenost + " metrov.";
    
    const obrazok = document.getElementById("obrazok");
    obrazok.src = smer + ".png";
}
</script>

</body>
</html>
